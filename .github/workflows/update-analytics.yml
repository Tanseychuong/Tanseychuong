name: Update GitHub Analytics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas matplotlib python-dotenv

      - name: Run analytics script
        env:
          GITHUB_TOKEN: ${{ secrets.ANALYTICS_TOKEN }}
          GITHUB_USERNAME: Tanseychuong
        run: python script.py

      - name: Commit updated charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add analytics/
          git diff --quiet --cached || git commit -m "Auto-update analytics charts"
          git push
